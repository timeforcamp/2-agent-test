<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NEON ASTEROIDS</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#0ff;font-family:'Courier New',monospace;overflow:hidden;user-select:none}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{background:radial-gradient(circle at center,#001018 0%,#000 80%);box-shadow:0 0 40px #0ff4 inset, 0 0 30px #f0f8;image-rendering:pixelated}
  #hud{position:fixed;top:10px;left:0;right:0;display:flex;justify-content:space-between;padding:0 20px;font-size:18px;letter-spacing:3px;text-shadow:0 0 8px #0ff,0 0 16px #0ff;pointer-events:none}
  #title{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:#000c;backdrop-filter:blur(2px);z-index:10}
  #title h1{font-size:64px;margin:0 0 8px;color:#f0f;text-shadow:0 0 10px #f0f,0 0 20px #f0f,0 0 40px #f0f;letter-spacing:8px}
  #title h2{font-size:24px;margin:0 0 24px;color:#0ff;text-shadow:0 0 10px #0ff;letter-spacing:6px}
  #title p{margin:6px;font-size:14px;color:#9ff;letter-spacing:2px}
  #title .blink{animation:blink 1s steps(2,end) infinite;margin-top:30px;font-size:18px;color:#ff0;text-shadow:0 0 8px #ff0}
  @keyframes blink{50%{opacity:0}}
  .hidden{display:none!important}
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="900" height="700"></canvas></div>
<div id="hud">
  <div>SCORE <span id="score">0</span></div>
  <div>WAVE <span id="wave">1</span></div>
  <div>LIVES <span id="lives">3</span></div>
</div>
<div id="title">
  <h1>NEON</h1>
  <h2>ASTEROIDS</h2>
  <p>&larr; &rarr;  ROTATE</p>
  <p>&uarr;  THRUST</p>
  <p>SPACE  FIRE</p>
  <p>S  HYPERSPACE</p>
  <div class="blink">PRESS ANY KEY TO START</div>
</div>
<script>
(() => {
  const cvs = document.getElementById('c');
  const ctx = cvs.getContext('2d');
  const W = cvs.width, H = cvs.height;
  const $ = id => document.getElementById(id);

  // ---------- audio (tiny WebAudio beeper) ----------
  let ac;
  const beep = (freq, dur=0.08, type='square', vol=0.08) => {
    try {
      ac = ac || new (window.AudioContext||window.webkitAudioContext)();
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.value = vol;
      g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
      o.connect(g).connect(ac.destination);
      o.start(); o.stop(ac.currentTime + dur);
    } catch(e){}
  };

  // ---------- state ----------
  const keys = {};
  let score = 0, wave = 1, lives = 3, gameOver = false, started = false;

  const ship = {
    x: W/2, y: H/2, a: -Math.PI/2, vx: 0, vy: 0, r: 14,
    thrusting: false, cool: 0, invuln: 120, dead: false, respawn: 0
  };

  const bullets = [];
  const asteroids = [];
  const particles = [];

  function rand(a,b){return a + Math.random()*(b-a);}
  function wrap(o){
    if(o.x < -20) o.x = W+20; else if(o.x > W+20) o.x = -20;
    if(o.y < -20) o.y = H+20; else if(o.y > H+20) o.y = -20;
  }

  function makeAsteroid(x,y,size){
    const verts = 10 + Math.floor(rand(0,6));
    const offs = [];
    for(let i=0;i<verts;i++) offs.push(rand(0.7,1.2));
    const speed = rand(0.4, 1.4) * (4-size) * 0.6;
    const ang = rand(0, Math.PI*2);
    return {
      x, y, vx: Math.cos(ang)*speed, vy: Math.sin(ang)*speed,
      a: rand(0, Math.PI*2), va: rand(-0.02,0.02),
      size, r: size===3?44:size===2?26:14,
      verts, offs,
      hue: rand(160,300)
    };
  }

  function spawnWave(n){
    asteroids.length = 0;
    for(let i=0;i<n;i++){
      let x,y;
      do { x = rand(0,W); y = rand(0,H); }
      while(Math.hypot(x-ship.x, y-ship.y) < 180);
      asteroids.push(makeAsteroid(x,y,3));
    }
  }

  function explode(x,y,hue,count=20,spd=4){
    for(let i=0;i<count;i++){
      const a = rand(0,Math.PI*2);
      const s = rand(0.5,spd);
      particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(20,50),max:50,hue});
    }
  }

  function fire(){
    if(ship.cool>0 || ship.dead) return;
    const sp = 8;
    bullets.push({
      x: ship.x + Math.cos(ship.a)*ship.r,
      y: ship.y + Math.sin(ship.a)*ship.r,
      vx: ship.vx + Math.cos(ship.a)*sp,
      vy: ship.vy + Math.sin(ship.a)*sp,
      life: 60
    });
    ship.cool = 8;
    beep(880, 0.05, 'square', 0.05);
  }

  function hyperspace(){
    if(ship.dead) return;
    ship.x = rand(40, W-40);
    ship.y = rand(40, H-40);
    ship.vx = ship.vy = 0;
    ship.invuln = 60;
    beep(220, 0.15, 'sawtooth', 0.06);
    beep(440, 0.15, 'sawtooth', 0.04);
  }

  function killShip(){
    if(ship.invuln>0 || ship.dead) return;
    ship.dead = true; ship.respawn = 120; lives--;
    explode(ship.x, ship.y, 180, 40, 6);
    beep(120, 0.4, 'sawtooth', 0.1);
    beep(80, 0.5, 'square', 0.08);
    $('lives').textContent = lives;
    if(lives <= 0) gameOver = true;
  }

  function respawn(){
    ship.x = W/2; ship.y = H/2; ship.vx = ship.vy = 0; ship.a = -Math.PI/2;
    ship.dead = false; ship.invuln = 120;
  }

  function splitAsteroid(a){
    explode(a.x, a.y, a.hue, 12, 3);
    beep(160 + (3-a.size)*120, 0.15, 'square', 0.07);
    if(a.size > 1){
      asteroids.push(makeAsteroid(a.x, a.y, a.size-1));
      asteroids.push(makeAsteroid(a.x, a.y, a.size-1));
    }
    score += a.size===3?20: a.size===2?50: 100;
    $('score').textContent = score;
  }

  // ---------- input ----------
  addEventListener('keydown', e => {
    if(!started){
      started = true; $('title').classList.add('hidden');
      spawnWave(4);
      return;
    }
    if(gameOver && (e.key === 'r' || e.key === 'R' || e.key === 'Enter')){
      score = 0; wave = 1; lives = 3; gameOver = false;
      $('score').textContent = 0; $('wave').textContent = 1; $('lives').textContent = 3;
      respawn(); spawnWave(4);
      return;
    }
    keys[e.key] = true;
    if(e.key === ' '){ e.preventDefault(); fire(); }
    if(e.key === 's' || e.key === 'S') hyperspace();
  });
  addEventListener('keyup', e => { keys[e.key] = false; });

  // ---------- update / draw ----------
  function update(){
    if(gameOver) return;

    if(ship.dead){
      ship.respawn--;
      if(ship.respawn <= 0 && lives > 0) respawn();
    } else {
      if(keys.ArrowLeft) ship.a -= 0.07;
      if(keys.ArrowRight) ship.a += 0.07;
      ship.thrusting = !!keys.ArrowUp;
      if(ship.thrusting){
        ship.vx += Math.cos(ship.a)*0.12;
        ship.vy += Math.sin(ship.a)*0.12;
        if(Math.random()<0.6){
          const a = ship.a + Math.PI + rand(-0.3,0.3);
          particles.push({
            x: ship.x - Math.cos(ship.a)*ship.r,
            y: ship.y - Math.sin(ship.a)*ship.r,
            vx: Math.cos(a)*rand(1,3) + ship.vx*0.3,
            vy: Math.sin(a)*rand(1,3) + ship.vy*0.3,
            life: 18, max: 18, hue: rand(20,60)
          });
        }
      }
      ship.vx *= 0.992; ship.vy *= 0.992;
      ship.x += ship.vx; ship.y += ship.vy;
      wrap(ship);
      if(ship.cool>0) ship.cool--;
      if(ship.invuln>0) ship.invuln--;
    }

    // bullets
    for(let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      b.x += b.vx; b.y += b.vy; b.life--;
      wrap(b);
      if(b.life<=0) bullets.splice(i,1);
    }

    // asteroids
    for(let i=asteroids.length-1;i>=0;i--){
      const a = asteroids[i];
      a.x += a.vx; a.y += a.vy; a.a += a.va; wrap(a);
      // hit ship?
      if(!ship.dead && ship.invuln<=0 && Math.hypot(a.x-ship.x,a.y-ship.y) < a.r + ship.r*0.8){
        killShip();
      }
      // hit bullet?
      for(let j=bullets.length-1;j>=0;j--){
        const b = bullets[j];
        if(Math.hypot(a.x-b.x,a.y-b.y) < a.r){
          bullets.splice(j,1);
          asteroids.splice(i,1);
          splitAsteroid(a);
          break;
        }
      }
    }

    // particles
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vx *= 0.96; p.vy *= 0.96; p.life--;
      if(p.life<=0) particles.splice(i,1);
    }

    // next wave
    if(asteroids.length === 0 && !gameOver){
      wave++; $('wave').textContent = wave;
      spawnWave(3 + wave);
    }
  }

  function drawShip(){
    if(ship.dead) return;
    if(ship.invuln>0 && Math.floor(ship.invuln/4)%2===0) return;
    ctx.save();
    ctx.translate(ship.x, ship.y);
    ctx.rotate(ship.a);
    ctx.strokeStyle = '#0ff';
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 16;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ship.r, 0);
    ctx.lineTo(-ship.r*0.8, ship.r*0.7);
    ctx.lineTo(-ship.r*0.5, 0);
    ctx.lineTo(-ship.r*0.8, -ship.r*0.7);
    ctx.closePath();
    ctx.stroke();
    if(ship.thrusting && Math.random()<0.7){
      ctx.strokeStyle = '#ff0';
      ctx.shadowColor = '#ff8';
      ctx.beginPath();
      ctx.moveTo(-ship.r*0.5, ship.r*0.35);
      ctx.lineTo(-ship.r*1.3, 0);
      ctx.lineTo(-ship.r*0.5, -ship.r*0.35);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawAsteroid(a){
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.a);
    const col = `hsl(${a.hue},100%,60%)`;
    ctx.strokeStyle = col;
    ctx.shadowColor = col; ctx.shadowBlur = 14;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for(let i=0;i<a.verts;i++){
      const ang = (i/a.verts)*Math.PI*2;
      const r = a.r * a.offs[i];
      const x = Math.cos(ang)*r, y = Math.sin(ang)*r;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  function drawBullet(b){
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 12;
    ctx.fillRect(b.x-2, b.y-2, 4, 4);
  }

  function drawParticle(p){
    const al = p.life / p.max;
    ctx.fillStyle = `hsla(${p.hue},100%,60%,${al})`;
    ctx.shadowColor = `hsl(${p.hue},100%,60%)`;
    ctx.shadowBlur = 8;
    ctx.fillRect(p.x-1.5, p.y-1.5, 3, 3);
  }

  function draw(){
    // trail/fade for neon glow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(0,0,W,H);

    ctx.shadowBlur = 0;

    asteroids.forEach(drawAsteroid);
    bullets.forEach(drawBullet);
    particles.forEach(drawParticle);
    drawShip();

    if(gameOver){
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#f0f';
      ctx.shadowColor = '#f0f'; ctx.shadowBlur = 20;
      ctx.font = 'bold 64px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W/2, H/2 - 20);
      ctx.fillStyle = '#0ff';
      ctx.shadowColor = '#0ff';
      ctx.font = '20px Courier New';
      ctx.fillText('SCORE ' + score, W/2, H/2 + 20);
      ctx.fillStyle = '#ff0';
      ctx.shadowColor = '#ff0';
      ctx.fillText('PRESS R TO RESTART', W/2, H/2 + 60);
    }
  }

  function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
